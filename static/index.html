<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>欧洲 AI 版权态势监控</title>
    <link rel="stylesheet" href="/styles.css?v=20260620-worldmonitor3" />
  </head>
  <body class="monitor-world">
    <div class="wm-shell">
      <header class="wm-topbar">
        <div class="wm-brand">
          <span class="wm-live-dot"></span>
          <div>
            <p>AI COPYRIGHT EUROPE</p>
            <h1>欧洲版权诉讼与立法态势监控</h1>
          </div>
        </div>
        <div class="wm-status-strip">
          <span id="systemClock">--:-- UTC</span>
          <span id="activeJurisdiction">全欧洲视图</span>
          <span id="activeLayerName">诉讼层</span>
          <span id="refreshStatus">同步中</span>
          <span id="sourceCoverage">源 0/0</span>
          <span>EUROPE</span>
        </div>
        <nav class="wm-actions">
          <button class="wm-icon-button" type="button" aria-label="搜索">⌕</button>
          <button class="wm-icon-button" type="button" aria-label="视图">◎</button>
          <a href="/admin.html">后台审核</a>
          <button id="runMonitor">立即同步</button>
        </nav>
      </header>

      <aside class="wm-left-dock">
        <section class="wm-panel-block">
          <div class="wm-section-title">
            <span>LAYERS</span>
            <strong>监控图层</strong>
          </div>
          <div class="wm-layer-stack">
            <button data-evidence="litigation" class="active">
              <span>诉讼动态</span>
              <strong id="metricNews">0</strong>
            </button>
            <button data-evidence="official">
              <span>官方文书</span>
              <strong id="metricOfficial">0</strong>
            </button>
            <button data-evidence="rights">
              <span>权利人发声</span>
              <strong id="metricRights">0</strong>
            </button>
            <button data-evidence="legislation">
              <span>立法动态</span>
              <strong id="metricLegislation">0</strong>
            </button>
            <button data-evidence="video">
              <span>视频情报</span>
              <strong id="metricVideo">0</strong>
            </button>
            <button data-evidence="market">
              <span>金融影响</span>
              <strong id="metricMarket">0</strong>
            </button>
            <button data-evidence="calendar">
              <span>风险日历</span>
              <strong id="metricCalendar">0</strong>
            </button>
          </div>
        </section>

        <section class="wm-panel-block">
          <div class="wm-section-title">
            <span>RANGE</span>
            <strong>时间窗口</strong>
          </div>
          <div class="wm-range-tabs">
            <button data-range="7d">7 天</button>
            <button data-range="30d">30 天</button>
            <button data-range="all" class="active">全部</button>
          </div>
        </section>

        <section class="wm-panel-block">
          <div class="wm-section-title">
            <span>STATUS</span>
            <strong>核心指标</strong>
          </div>
          <div class="wm-metrics" id="metrics"></div>
        </section>

        <section class="wm-panel-block">
          <div class="wm-section-title">
            <span>SOURCES</span>
            <strong>源状态</strong>
          </div>
          <div class="wm-source-stack" id="sourceStack"></div>
        </section>
      </aside>

      <main class="wm-layout">
        <section class="wm-map-stage">
          <div class="wm-map-toolbar">
            <div>
              <p>OSINT COPYRIGHT MAP</p>
              <h2>欧洲版权风险地图</h2>
            </div>
            <div class="wm-map-controls">
              <button id="resetJurisdiction">全欧洲</button>
              <span>lat 50.1</span>
              <span>lon 10.2</span>
              <span>zoom 4.2</span>
            </div>
          </div>

          <div class="wm-map" id="nordicMap" aria-label="欧洲 AI 版权诉讼、立法与权利人动态地图"></div>
          <div class="wm-map-modebar" aria-label="地图图层">
            <button type="button" data-evidence="litigation" class="active">诉讼</button>
            <button type="button" data-evidence="rights">权利人</button>
            <button type="button" data-evidence="legislation">立法</button>
            <button type="button" data-evidence="video">视频</button>
            <button type="button" data-evidence="market">金融</button>
            <button type="button" data-evidence="calendar">日历</button>
            <button type="button" data-evidence="official">官方源</button>
          </div>
          <div class="wm-zoom-stack" aria-label="地图缩放">
            <button type="button">+</button>
            <button type="button">−</button>
            <button type="button">⌖</button>
          </div>
          <div class="wm-threat-legend" aria-label="风险等级图例">
            <span><i class="p0"></i>P0</span>
            <span><i class="p1"></i>P1</span>
            <span><i class="p2"></i>P2</span>
            <span><i class="p3"></i>P3</span>
          </div>
          <div class="wm-live-console">
            <div>
              <span>LIVE FEED</span>
              <strong id="liveHeadline">等待情报同步</strong>
            </div>
            <div>
              <span>WINDOW</span>
              <strong id="liveWindow">全部时间</strong>
            </div>
            <div>
              <span>RECENT</span>
              <strong id="recentSignalCount">0 条 / 30 天</strong>
            </div>
          </div>
        </section>

        <section class="wm-case-dock">
          <div class="wm-section-title">
            <span>WATCHLIST</span>
            <strong>诉讼与监控对象</strong>
          </div>
          <div class="wm-case-strip" id="cases"></div>
        </section>
      </main>

      <aside class="wm-right-dock">
        <div class="wm-intel-head">
          <div>
            <p>实时简报 · 新到旧</p>
            <h2 id="evidenceTitle">诉讼动态有哪些</h2>
          </div>
          <div class="filters wm-priority-filter">
            <button data-filter="all" class="active">全部</button>
            <button data-filter="P0">P0</button>
            <button data-filter="P1">P1</button>
          </div>
        </div>
        <div class="wm-evidence-tabs">
          <button data-evidence="litigation" class="active">诉讼</button>
          <button data-evidence="official">文书</button>
          <button data-evidence="rights">权利人</button>
          <button data-evidence="legislation">立法</button>
          <button data-evidence="video">视频</button>
          <button data-evidence="market">金融</button>
          <button data-evidence="calendar">日历</button>
        </div>
        <div id="intelCards" class="wm-intel-feed"></div>
      </aside>

      <footer class="wm-timeline">
        <div class="wm-section-title">
          <span>TIMELINE</span>
          <strong>最新信号</strong>
        </div>
        <div class="wm-timeline-track" id="timelineItems"></div>
      </footer>
    </div>

    <dialog id="caseDialog">
      <button class="close" id="closeDialog" aria-label="关闭">×</button>
      <div id="caseDetail"></div>
    </dialog>

    <script src="/app.js?v=20260620-worldmonitor3"></script>
  </body>
</html>
